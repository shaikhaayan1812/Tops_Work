<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato-style Food Order</title>
</head>
<body>
    <h1>Food Order Form</h1>
    
    <form action="#" method="POST">
        <div>
            <label for="name">Your Name:</label><br>
            <input type="text" id="name" name="name" required>
        </div>
        <br>
        <div>
            <label for="food-item">Food Item:</label><br>
            <select id="food-item" name="food-item" required>
                <option value="" disabled selected>Select a food item</option>
                <option value="pizza">Margherita Pizza</option>
                <option value="burger">Classic Burger</option>
                <option value="pasta">Pasta Carbonara</option>
                <option value="sushi">California Roll</option>
            </select>
        </div>
        <br>
        <div>
            <label for="quantity">Quantity:</label><br>
            <input type="number" id="quantity" name="quantity" min="1" max="infinity" value="1" required>
        </div>
        <br>
        <div>
            <label for="instructions">Delivery Instructions:</label><br>
            <textarea id="instructions" name="instructions" rows="3" cols="40" placeholder="Any special instructions for delivery..."></textarea>
        </div>
        <br>
        <!-- Task 5: Disabled input field for fixed order ID -->
        <!-- 
            This field is disabled because:
            1. The order ID is generated by the system, not user input
            2. Users should not be able to modify the order ID
            3. Disabled fields are not submitted with the form data
            4. It's for display purposes only - showing the assigned order ID
        -->
        <div>
            <label for="order-id">Order ID:</label><br>
            <input type="text" id="order-id" name="order-id" value="ORD12345" disabled>
        </div>
        <br>
        <button type="submit">Place Order</button>
    </form>
</body>
</html>
