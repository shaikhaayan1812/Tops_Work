<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist Bar</title>
    <style>
        .playlist-bar {
            display: flex;
            align-items: center;
            background-color: #121212;
            padding: 15px;
            gap: 15px;
            overflow-x: auto;
        }
        .song-card {
            min-width: 150px;
            background-color: #282828;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .song-name {
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .artist-name {
            color: #b3b3b3;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>My Playlist</h1>
    
    <div class="playlist-bar">
        <div class="song-card">
            <div class="song-name">Blinding Lights</div>
            <div class="artist-name">The Weeknd</div>
        </div>
        <div class="song-card">
            <div class="song-name">Shape of You</div>
            <div class="artist-name">Ed Sheeran</div>
        </div>
        <div class="song-card">
            <div class="song-name">Bohemian Rhapsody</div>
            <div class="artist-name">Queen</div>
        </div>
        <div class="song-card">
            <div class="song-name">Dance Monkey</div>
            <div class="artist-name">Tones and I</div>
        </div>
        <div class="song-card">
            <div class="song-name">Someone Like You</div>
            <div class="artist-name">Adele</div>
        </div>
    </div>
</body>
</html>
