<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Icons Flexbox</title>
    <style>
        .social-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #f5f5f5;
            margin: 20px 0;
        }
        .social-icon {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .whatsapp { background-color: #25d366; }
        .zomato { background-color: #cb202d; }
        .spotify { background-color: #1db954; }
    </style>
</head>
<body>
    <h1>Follow Us on Social Media</h1>
    
    <div class="social-container">
        <div class="social-icon instagram">Instagram</div>
        <div class="social-icon whatsapp">WhatsApp</div>
        <div class="social-icon zomato">Zomato</div>
        <div class="social-icon spotify">Spotify</div>
    </div>
</body>
</html>
