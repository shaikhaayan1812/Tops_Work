<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Restaurant Card</title>
    <style>
        .restaurant-card {
            border: 2px solid #e0e0e0;
            margin: 20px;
            padding: 15px;
            max-width: 300px;
        }
        .restaurant-name {
            font-size: 24px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #ccc;
        }
        .cuisine-type {
            font-style: italic;
            color: #666;
            margin: 10px 0;
            padding: 5px 0;
        }
        .rating {
            background-color: #cb202d;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="restaurant-card">
        <div class="restaurant-name">Pizza Paradise</div>
        <div class="cuisine-type">Italian, Pizza, Pasta</div>
        <div class="rating">4.5 ★</div>
    </div>
</body>
</html>
