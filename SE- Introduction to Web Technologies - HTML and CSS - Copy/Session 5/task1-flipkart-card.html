<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Card</title>
</head>
<body>
    <div style="border: 1px solid #ccc; padding: 20px; max-width: 300px; margin: 20px;">
        <h2 style="background-color: #ffe135; font-size: 24px;">iPhone 15 Pro Max</h2>
        <img src="15pro.png" alt="iPhone 15 Pro Max" style="width: 100%;">
        <p>Latest Apple smartphone with A17 Pro chip and titanium design.</p>
        <p><strong>₹1,59,999</strong> <del>₹1,79,999</del> <span style="color: green;">11% off</span></p>
        <button style="background-color: #2874f0; color: white; padding: 10px 20px; border: none;">Add to Cart</button>
    </div>
</body>
</html>
