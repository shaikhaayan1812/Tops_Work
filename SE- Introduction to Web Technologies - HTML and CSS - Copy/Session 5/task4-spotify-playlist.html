<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist</title>
    <style>
        /* Class selector for all playlist items */
        .playlist-item {
            background-color: #121212;
            color: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
        }
        
        /* ID selector for currently playing song */
        #currently-playing {
            background-color: #1db954;
            color: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>My Playlist</h1>
    
    <div class="playlist-item">1. Blinding Lights - The Weeknd</div>
    <div class="playlist-item">2. Shape of You - Ed Sheeran</div>
    <div id="currently-playing">3. Bohemian Rhapsody - Queen (Currently Playing)</div>
    <div class="playlist-item">4. Dance Monkey - Tones and I</div>
    <div class="playlist-item">5. Someone Like You - Adele</div>
</body>
</html>
